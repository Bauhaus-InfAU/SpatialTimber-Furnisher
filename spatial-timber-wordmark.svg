      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;500&amp;display=swap');
      .spatial { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 700; font-size: 28px; fill: #141413; letter-spacing: -0.022em; }
      .timber  { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 500; font-size: 28px; fill: #141413; letter-spacing: -0.022em; }
