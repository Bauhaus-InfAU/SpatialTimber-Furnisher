name: Deploy Furnisher App

on:
  push:
    branches: [main]
    paths:
      - "furnisher-app/**"
      - "furnisher-engine/**"
      - ".github/workflows/deploy-furnisher-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: furnisher-app/package-lock.json

      - name: Install dependencies
        working-directory: furnisher-app
        run: npm ci

      - name: Build
        working-directory: furnisher-app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: furnisher-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
